<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Rich Text :: Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-preview {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            border-radius: 12px;
            background: #000;
            font-size: 1.75rem;
            font-weight: bold;
            text-align: center;
            /* Важно для отображения пробелов и переносов */
            white-space: pre-wrap; 
            word-wrap: break-word;
            line-height: 1.2;
        }
        /* Стиль для каждого символа в превью, чтобы пробелы не "схлопывались" */
        .char-span {
            display: inline;
            white-space: pre;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }
        .copy-btn:active { transform: scale(0.95); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                Unity Rich Text :: Generator
            </h1>
            <p class="text-slate-400 mt-2">by smoxeki</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass p-6 rounded-2xl space-y-4 shadow-xl">
                    <label class="block">
                        <span class="text-sm font-semibold text-slate-300">Введите текст:</span>
                        <textarea id="inputText" class="w-full mt-2 p-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none h-24 text-lg" placeholder="Введите ваш текст сюда:">ПРИМЕР :: EXAMPLE</textarea>
                    </label>

                    <div>
                        <span class="text-sm font-semibold text-slate-300">Тип окрашивания:</span>
                        <div class="flex gap-2 mt-2">
                            <button onclick="setMode('solid')" id="btn-solid" class="flex-1 py-2 rounded-lg transition font-medium">Один цвет</button>
                            <button onclick="setMode('gradient')" id="btn-gradient" class="flex-1 py-2 rounded-lg transition font-medium">Градиент</button>
                        </div>
                    </div>

                    <div id="colorSettings">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold text-slate-300">Цвета (2-5):</span>
                            <div class="flex gap-1">
                                <button onclick="adjustColorsCount(-1)" class="w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-md transition">-</button>
                                <button onclick="adjustColorsCount(1)" class="w-8 h-8 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-md transition">+</button>
                            </div>
                        </div>
                        <div id="colorPickers" class="flex flex-wrap gap-3 p-3 bg-slate-950/50 rounded-xl border border-slate-800"></div>
                    </div>

                    <div id="hardnessSetting">
                        <label class="block">
                            <div class="flex justify-between text-sm font-semibold text-slate-300">
                                <span>Плотность градиента:</span>
                                <span id="hardnessVal" class="text-blue-400 text-xs">100%</span>
                            </div>
                            <input type="range" id="hardness" min="5" max="100" value="100" class="w-full mt-2 accent-blue-500">
                            <div class="flex justify-between text-[10px] text-slate-500 mt-1 uppercase font-bold">
                                <span>Гладкий</span>
                                <span>Жесткий</span>
                            </div>
                        </label>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <label class="flex items-center gap-3 cursor-pointer p-3 bg-slate-900/50 rounded-lg border border-slate-800 hover:bg-slate-800 transition">
                            <input type="checkbox" id="bold" class="w-5 h-5 rounded accent-blue-500">
                            <span class="text-sm font-medium">ЖИРНЫЙ</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer p-3 bg-slate-900/50 rounded-lg border border-slate-800 hover:bg-slate-800 transition">
                            <input type="checkbox" id="italic" class="w-5 h-5 rounded accent-blue-500">
                            <span class="text-sm font-medium">КУРСИВ</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="glass p-6 rounded-2xl shadow-xl">
                    <span class="text-sm font-semibold text-slate-300 mb-4 block">Предпросмотр:</span>
                    <div id="preview" class="gradient-preview"></div>
                </div>

                <div class="glass p-6 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-semibold text-slate-300 flex items-center gap-2">
                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                            Код Unity:
                        </span>
                        <button onclick="copyCode()" class="copy-btn bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 shadow-lg shadow-blue-900/20">
                            <span id="copyBtnText">Копировать</span>
                        </button>
                    </div>
                    <textarea id="outputText" readonly class="w-full p-4 bg-black/60 text-emerald-400 font-mono text-xs md:text-sm rounded-xl border border-slate-700 h-48 focus:outline-none resize-none"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mode = 'gradient';
        let colors = ['#38bdf8', '#818cf8', '#fb7185'];
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const preview = document.getElementById('preview');
        const hardnessInput = document.getElementById('hardness');
        const hardnessVal = document.getElementById('hardnessVal');
        const boldInput = document.getElementById('bold');
        const italicInput = document.getElementById('italic');
        const colorPickersContainer = document.getElementById('colorPickers');

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btn-solid').className = mode === 'solid' ? 'flex-1 py-2 rounded-lg bg-blue-600 text-white shadow-lg' : 'flex-1 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700';
            document.getElementById('btn-gradient').className = mode === 'gradient' ? 'flex-1 py-2 rounded-lg bg-blue-600 text-white shadow-lg' : 'flex-1 py-2 rounded-lg bg-slate-800 text-slate-400 hover:bg-slate-700';
            document.getElementById('hardnessSetting').style.opacity = mode === 'solid' ? '0.3' : '1';
            updatePickers();
            generate();
        }

        function adjustColorsCount(delta) {
            const newCount = colors.length + delta;
            if (newCount >= 2 && newCount <= 5) {
                if (delta > 0) colors.push(colors[colors.length-1]);
                else colors.pop();
                updatePickers();
                generate();
            }
        }

        function updatePickers() {
            colorPickersContainer.innerHTML = '';
            const list = mode === 'solid' ? [colors[0]] : colors;
            list.forEach((color, index) => {
                const input = document.createElement('input');
                input.type = 'color';
                input.value = color;
                input.oninput = (e) => {
                    colors[index] = e.target.value;
                    generate();
                };
                colorPickersContainer.appendChild(input);
            });
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return rgbToHex(r, g, b);
        }

        function generate() {
            const text = inputText.value;
            const hardness = parseInt(hardnessInput.value) / 100;
            hardnessVal.innerText = Math.round(hardness * 100) + '%';
            
            let richText = "";
            let htmlContainer = document.createElement('div');

            if (mode === 'solid') {
                const color = colors[0];
                richText = `<color=${color}>${text}</color>`;
                const span = document.createElement('span');
                span.style.color = color;
                span.textContent = text;
                htmlContainer.appendChild(span);
            } else {
                const chars = Array.from(text);
                const charCount = chars.length;
                
                chars.forEach((char, i) => {
                    if (char === '\n') {
                        richText += '\n';
                        htmlContainer.appendChild(document.createElement('br'));
                        return;
                    }

                    let progress = charCount > 1 ? i / (charCount - 1) : 0;
                    if (hardness < 1) {
                        const steps = Math.max(2, Math.floor(charCount * hardness));
                        progress = Math.floor(progress * steps) / (steps - 1);
                    }

                    const segmentCount = colors.length - 1;
                    const scaledProgress = progress * segmentCount;
                    const index = Math.min(Math.floor(scaledProgress), segmentCount - 1);
                    const factor = scaledProgress - index;
                    const color = interpolateColor(colors[index], colors[index + 1], factor);
                    
                    richText += char === ' ' ? ' ' : `<color=${color}>${char}</color>`;
                    
                    const charSpan = document.createElement('span');
                    charSpan.className = 'char-span';
                    charSpan.style.color = color;
                    // Используем textContent для сохранения пробелов в HTML
                    charSpan.textContent = char;
                    htmlContainer.appendChild(charSpan);
                });
            }

            if (boldInput.checked) {
                richText = `<b>${richText}</b>`;
                htmlContainer.style.fontWeight = 'bold';
            }
            if (italicInput.checked) {
                richText = `<i>${richText}</i>`;
                htmlContainer.style.fontStyle = 'italic';
            }

            outputText.value = richText;
            preview.innerHTML = '';
            preview.appendChild(htmlContainer);
        }

        function copyCode() {
            const copyBtnText = document.getElementById('copyBtnText');
            outputText.select();
            document.execCommand('copy');
            copyBtnText.innerText = 'Скопировано!';
            setTimeout(() => copyBtnText.innerText = 'Копировать', 2000);
        }

        inputText.oninput = generate;
        hardnessInput.oninput = generate;
        boldInput.onchange = generate;
        italicInput.onchange = generate;

        setMode('gradient');
    </script>
</body>
</html>
